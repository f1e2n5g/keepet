name = "keepet-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# 本機開發用 JWT secret；正式環境用 `wrangler secret put JWT_SECRET` 覆蓋。
[vars]
JWT_SECRET = "dev-only-change-me"

[[d1_databases]]
binding = "DB"
database_name = "keepet"
# 建立資料庫後，把 `wrangler d1 create keepet` 回傳的 id 填進來：
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

# Email 週報（Resend API）— 正式環境用 `wrangler secret put RESEND_API_KEY`
# [vars] 可加 FROM_EMAIL = "KeePet <noreply@keepet.app>"

# Cron Trigger：每週一 08:00 UTC 自動寄週報
[triggers]
crons = ["0 8 * * 1"]

# 寵物造型/動畫等靜態素材（備用）
# [[r2_buckets]]
# binding = "ASSETS"
# bucket_name = "keepet-assets"
